name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Set up development environment
      run: make dev-setup
    
    - name: Check formatting with ruff
      run: make format
      
    - name: Lint with ruff
      run: make ruff
      
    - name: Type check with mypy
      run: make mypy
      
  security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Set up development environment
      run: make dev-setup
    
    - name: Run security checks (non-failing)
      run: make security-check || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Set up development environment
      run: make dev-setup
        
    - name: Install Playwright dependencies
      run: |
        uv run playwright install --with-deps chromium
      
    - name: Generate test coverage
      run: make coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d  # v5.4.2
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  docker:
    needs: [lint-and-type-check, security, test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0
      
    - name: Login to Docker Hub
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Get version
      id: version
      run: |
        VERSION=$(make -s get-version | grep "Current version:" | cut -d' ' -f3)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Build Docker image
      run: make docker-build
    
    - name: Tag for GitHub Container Registry
      run: |
        docker tag threatflux/playwright-fetch:latest ghcr.io/threatflux/playwright-fetch:latest
        docker tag threatflux/playwright-fetch:${{ steps.version.outputs.version }} ghcr.io/threatflux/playwright-fetch:${{ steps.version.outputs.version }}
    
    - name: Push to DockerHub
      run: |
        docker push threatflux/playwright-fetch:latest
        docker push threatflux/playwright-fetch:${{ steps.version.outputs.version }}
    
    - name: Push to GitHub Container Registry
      run: |
        docker push ghcr.io/threatflux/playwright-fetch:latest
        docker push ghcr.io/threatflux/playwright-fetch:${{ steps.version.outputs.version }}
    
    - name: Test Docker image
      run: make docker-test