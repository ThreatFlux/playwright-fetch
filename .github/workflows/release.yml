name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    outputs:
      version:
        description: "The version that was released"
        value: ${{ jobs.validate.outputs.version }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.13'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Verify version matches
        run: |
          make -s get-version
          CODE_VERSION=$(make -s get-version | grep "Current version:" | cut -d' ' -f3)
          TAG_VERSION=${{ steps.version.outputs.version }}
          
          if [ "$CODE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! Tag version ($TAG_VERSION) does not match code version ($CODE_VERSION)"
            exit 1
          fi
          
          echo "Versions match: $CODE_VERSION"

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.13'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Set up development environment
        run: make dev-setup
      
      - name: Install Playwright dependencies
        run: |
          uv run playwright install --with-deps chromium
      
      - name: Run linting
        run: make lint
        
      - name: Run security checks (non-failing)
        run: make security-check || true
      
      - name: Run tests with coverage
        run: make coverage
      
      - name: Check coverage thresholds
        run: |
          uv run coverage report --fail-under=90

  create-release:
    runs-on: ubuntu-latest
    needs: [validate, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.13'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Set up development environment
        run: make dev-setup
      
      - name: Build package
        run: make build
      
      - name: Check distribution
        run: uv run twine check dist/*
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          name: Release ${{ needs.validate.outputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/*
            LICENSE
            README.md

  docker-release:
    runs-on: ubuntu-latest
    needs: [validate, create-release]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0
      
      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker image
        run: make docker-build
        
      - name: Tag Docker images
        run: |
          docker tag threatflux/playwright-fetch:latest threatflux/playwright-fetch:${{ needs.validate.outputs.version }}
          docker tag threatflux/playwright-fetch:latest ghcr.io/threatflux/playwright-fetch:latest
          docker tag threatflux/playwright-fetch:${{ needs.validate.outputs.version }} ghcr.io/threatflux/playwright-fetch:${{ needs.validate.outputs.version }}
          
          # Add image labels
          docker buildx imagetools create \
            --tag threatflux/playwright-fetch:latest \
            --tag threatflux/playwright-fetch:${{ needs.validate.outputs.version }} \
            --label "org.opencontainers.image.title=Playwright Fetch MCP Server" \
            --label "org.opencontainers.image.description=A Model Context Protocol server for fetching web content using Playwright" \
            --label "org.opencontainers.image.vendor=ThreatFlux" \
            --label "org.opencontainers.image.version=${{ needs.validate.outputs.version }}" \
            --label "org.opencontainers.image.licenses=MIT" \
            --label "org.opencontainers.image.source=https://github.com/ThreatFlux/playwright-fetch" \
            threatflux/playwright-fetch:latest
          
          # Add the same labels to GHCR images
          docker buildx imagetools create \
            --tag ghcr.io/threatflux/playwright-fetch:latest \
            --tag ghcr.io/threatflux/playwright-fetch:${{ needs.validate.outputs.version }} \
            --label "org.opencontainers.image.title=Playwright Fetch MCP Server" \
            --label "org.opencontainers.image.description=A Model Context Protocol server for fetching web content using Playwright" \
            --label "org.opencontainers.image.vendor=ThreatFlux" \
            --label "org.opencontainers.image.version=${{ needs.validate.outputs.version }}" \
            --label "org.opencontainers.image.licenses=MIT" \
            --label "org.opencontainers.image.source=https://github.com/ThreatFlux/playwright-fetch" \
            ghcr.io/threatflux/playwright-fetch:latest
      
      - name: Push to DockerHub
        run: |
          docker push threatflux/playwright-fetch:latest
          docker push threatflux/playwright-fetch:${{ needs.validate.outputs.version }}
      
      - name: Push to GitHub Container Registry
        run: |
          docker push ghcr.io/threatflux/playwright-fetch:latest
          docker push ghcr.io/threatflux/playwright-fetch:${{ needs.validate.outputs.version }}
      
      - name: Test Docker image
        run: make docker-test