name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Verify version matches
        run: |
          make -s get-version
          CODE_VERSION=$(make -s get-version | grep "Current version:" | cut -d' ' -f3)
          TAG_VERSION=${{ steps.version.outputs.version }}
          
          if [ "$CODE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! Tag version ($TAG_VERSION) does not match code version ($CODE_VERSION)"
            exit 1
          fi
          
          echo "Versions match: $CODE_VERSION"

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Set up development environment
        run: make dev-setup
      
      - name: Install Playwright dependencies
        run: |
          uv run playwright install --with-deps chromium
      
      - name: Run linting and type checks
        run: |
          make lint
          make security-check
      
      - name: Run tests with coverage
        run: make coverage
      
      - name: Check coverage thresholds
        run: |
          uv run coverage report --fail-under=90

  create-release:
    runs-on: ubuntu-latest
    needs: [validate, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Set up development environment
        run: make dev-setup
      
      - name: Build package
        run: make build
      
      - name: Check distribution
        run: uv run twine check dist/*
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ needs.validate.outputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/*
            LICENSE
            README.md
      
  docker-release:
    runs-on: ubuntu-latest
    needs: [validate, create-release]
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build Docker image
        run: make docker-build
        
      - name: Push Docker images
        run: |
          docker tag threatflux/playwright-fetch:latest threatflux/playwright-fetch:${{ needs.validate.outputs.version }}
          
          # Add image labels
          docker buildx imagetools create \
            --tag threatflux/playwright-fetch:latest \
            --tag threatflux/playwright-fetch:${{ needs.validate.outputs.version }} \
            --label "org.opencontainers.image.title=Playwright Fetch MCP Server" \
            --label "org.opencontainers.image.description=A Model Context Protocol server for fetching web content using Playwright" \
            --label "org.opencontainers.image.vendor=ThreatFlux" \
            --label "org.opencontainers.image.version=${{ needs.validate.outputs.version }}" \
            --label "org.opencontainers.image.licenses=MIT" \
            --label "org.opencontainers.image.source=https://github.com/ThreatFlux/playwright-fetch" \
            threatflux/playwright-fetch:latest
          
          docker push threatflux/playwright-fetch:latest
          docker push threatflux/playwright-fetch:${{ needs.validate.outputs.version }}
      
      - name: Test Docker image
        run: make docker-test